<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀플 성격 유형 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #faf9f6;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    color: #2c2b28;
  }

  #app {
    width: 100%;
    max-width: 560px;
  }

  .screen {
    animation: fadeIn 0.45s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 카드 ── */
  .card {
    background: #ffffff;
    border-radius: 18px;
    border: 0.5px solid #e0ddd6;
    padding: 2rem 1.75rem;
    margin-bottom: 1rem;
  }

  /* ── 타이포그래피 ── */
  h1 { font-size: 22px; font-weight: 500; line-height: 1.4; color: #2c2b28; }
  h2 { font-size: 18px; font-weight: 500; line-height: 1.5; color: #2c2b28; }
  h3 { font-size: 16px; font-weight: 500; color: #2c2b28; }
  p  { font-size: 15px; color: #6b6559; line-height: 1.8; }

  .small { font-size: 13px; color: #9e9a92; }
  .label { font-size: 12px; color: #8b9e8a; font-weight: 500; letter-spacing: 0.5px; }

  /* ── 버튼 ── */
  .btn {
    display: inline-block;
    width: 100%;
    text-align: center;
    background: #ffffff;
    border: 0.5px solid #c8c4bb;
    border-radius: 28px;
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 500;
    color: #2c2b28;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
    font-family: inherit;
  }
  .btn:hover  { background: #f5f3ef; border-color: #aaa49b; }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: #4a5568;
    color: #ffffff;
    border-color: #4a5568;
  }
  .btn-primary:hover { background: #2d3748; border-color: #2d3748; }

  /* ── 선택지 버튼 ── */
  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #faf9f6;
    border: 0.5px solid #ddd9d0;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-family: inherit;
    color: #2c2b28;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .option-btn:hover  { background: #f0ede6; border-color: #b5b0a6; }
  .option-btn:active { transform: scale(0.99); }
  .option-label { color: #9e9a92; font-size: 13px; margin-right: 10px; }

  /* ── 진행률 바 ── */
  .progress-wrap {
    background: #ece9e2;
    border-radius: 8px;
    height: 4px;
    margin-bottom: 1.75rem;
  }
  .progress-fill {
    background: #8b9e8a;
    border-radius: 8px;
    height: 4px;
    transition: width 0.4s ease;
  }

  /* ── 분석 중 ── */
  .dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 1.5rem; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #8b9e8a;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
    40%          { transform: scale(1);   opacity: 1; }
  }
  .step-msg {
    font-size: 14px;
    color: #9e9a92;
    margin-top: 8px;
    min-height: 22px;
    animation: fadeIn 0.35s ease;
  }

  /* ── 태그 ── */
  .tag {
    display: inline-block;
    background: #f0ede6;
    color: #6b6559;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    margin: 4px 4px 4px 0;
  }

  /* ── 편지 카드 ── */
  .letter-card {
    background: #ffffff;
    border-radius: 14px;
    border: 0.5px solid #ddd9d0;
    padding: 1.25rem 1.5rem;
    margin-bottom: 10px;
    transition: border-color 0.3s, background 0.3s;
  }
  .letter-card.opened {
    border-color: #8b9e8a;
    background: #f9fbf8;
  }

  .letter-open-btn {
    background: #f5f3ef;
    border: 0.5px solid #ddd9d0;
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: inherit;
    color: #6b6559;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.15s;
  }
  .letter-open-btn:hover { background: #e8e4dc; }
  .letter-open-btn.done {
    color: #8b9e8a;
    cursor: default;
    background: #f0f5ef;
    border-color: #b8cbb6;
  }

  /* ── 모달 ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 1.5rem;
  }
  .modal-backdrop.active { display: flex; animation: fadeIn 0.25s ease; }

  .modal-box {
    background: #fffdf9;
    border-radius: 18px;
    border: 0.5px solid #ddd9d0;
    padding: 2rem 1.75rem;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    animation: fadeIn 0.3s ease;
  }
  .modal-from  { font-size: 12px; color: #9e9a92; margin-bottom: 4px; }
  .modal-title {
    font-size: 16px; font-weight: 500; color: #2c2b28;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid #e8e4dc;
  }
  .modal-body {
    font-size: 15px; color: #6b6559; line-height: 1.9;
    white-space: pre-line;
  }
  .modal-close {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 10px;
    border-radius: 20px;
    border: 0.5px solid #c8c4bb;
    background: #ffffff;
    font-size: 14px;
    font-family: inherit;
    color: #6b6559;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #f0ede6; }

  /* ── 엔딩 박스 ── */
  .ending-box {
    background: #f9fbf8;
    border: 0.5px solid #b8cbb6;
    border-radius: 16px;
    padding: 2rem 1.75rem;
    margin-bottom: 1rem;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }
  .ending-box p {
    font-size: 15px;
    line-height: 2;
    color: #6b6559;
  }
  .ending-highlight {
    font-weight: 500;
    color: #2c2b28;
  }

  hr.divider {
    border: none;
    border-top: 0.5px solid #e0ddd6;
    margin: 1.5rem 0;
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    body { padding: 1.25rem 0.75rem 3rem; }
    .card { padding: 1.5rem 1.25rem; }
    h1 { font-size: 20px; }
    h2 { font-size: 17px; }
    .modal-box { padding: 1.5rem 1.25rem; }
  }
</style>
</head>

const modalContainer = document.getElementById('modal-container');

// ── 렌더링 진입점 ──
function render() {
  if      (state.page === 'start')     renderStart();
  else if (state.page === 'quiz')      renderQuiz();
  else if (state.page === 'analyzing') renderAnalyzing();
  else if (state.page === 'result')    renderResult();
}

// ══════════════════════════════════════════════
//  시작 화면
// ══════════════════════════════════════════════
function renderStart() {
  root.innerHTML = `
    <div class="screen">
      <div class="card" style="text-align:center; padding: 2.75rem 2rem;">
        <p class="small" style="margin-bottom: 1rem; letter-spacing: 0.6px;">TEAMWORK TYPE TEST</p>
        <h1 style="margin-bottom: 0.5rem;">팀플 성격 유형 테스트</h1>
        <p style="font-size: 14px; color: #9e9a92; margin-bottom: 0;">나는 팀플에서 어떤 역할을 맡는 사람일까?</p>
        <hr class="divider">
        <p style="font-size: 15px; line-height: 2; margin-bottom: 2rem;">
          팀플을 할 때 사람마다 자연스럽게 맡게 되는 역할이 있습니다.<br>
          당신은 방향을 잡는 사람일까요, 빈틈을 메우는 사람일까요,<br>
          아이디어를 내는 사람일까요, 아니면 분위기를 살리는 사람일까요?<br><br>
          간단한 질문을 통해 당신의 협업 성향을 확인해보세요.
        </p>
        <button class="btn btn-primary" onclick="startQuiz()">테스트 시작하기</button>
      </div>
      <p class="small" style="text-align:center; margin-top: 1rem;">총 6문항 · 약 2분 소요</p>
    </div>
  `;
}

function startQuiz() {
  state.page = 'quiz';
  state.answers = [];
  state.currentQ = 0;
  render();
}

// ══════════════════════════════════════════════
//  질문 화면
// ══════════════════════════════════════════════
function renderQuiz() {
  const q = QUESTIONS[state.currentQ];
  const total = QUESTIONS.length;
  const pct = Math.round(state.currentQ / total * 100);

  root.innerHTML = `
    <div class="screen">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <span class="small">Q ${state.currentQ + 1} / ${total}</span>
          <span class="small">${pct}% 완료</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill" style="width: ${pct}%"></div>
        </div>
        <h2 style="margin-bottom: 1.5rem;">${q.q}</h2>
        ${q.options.map(o => `
          <button class="option-btn" onclick="selectOption('${o.label}')">
            <span class="option-label">${o.label}</span>${o.text}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectOption(label) {
  state.answers.push(label);

  if (state.currentQ < QUESTIONS.length - 1) {
    state.currentQ++;
    root.style.opacity = '0';
    setTimeout(() => {
      root.style.opacity = '1';
      render();
    }, 160);
  } else {
    // 마지막 질문 → 분석 화면
    state.resultType = calcResult();
    state.page = 'analyzing';
    render();
    runAnalyzing();
  }
}

// ── 점수 계산 ──
function calcResult() {
  const count = { A: 0, B: 0, C: 0, D: 0 };
  state.answers.forEach(a => count[a]++);
  const max = Math.max(...Object.values(count));
  const winners = Object.keys(count).filter(k => count[k] === max);
  if (winners.length === 1) return winners[0];
  // 동점: 마지막 선택 답변 우선
  for (let i = state.answers.length - 1; i >= 0; i--) {
    if (winners.includes(state.answers[i])) return state.answers[i];
  }
  return winners[0];
}

// ══════════════════════════════════════════════
//  분석 중 화면
// ══════════════════════════════════════════════
const ANALYZE_STEPS = [
  "협업 성향 확인 중",
  "팀 내 역할 패턴 분석 중",
  "커뮤니케이션 방식 계산 중",
  "함께 일한 사람들의 기록 불러오는 중"
];

function renderAnalyzing() {
  root.innerHTML = `
    <div class="screen">
      <div class="card" style="text-align:center; padding: 3.5rem 2rem;">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <h2 style="margin-bottom: 0.5rem;">응답을 분석 중입니다…</h2>
        <p id="step-msg" class="step-msg">&nbsp;</p>
        <div id="done-area" style="display:none; margin-top: 2rem;">
          <p style="margin-bottom: 1rem; font-size: 14px; color: #9e9a92;">분석이 완료되었습니다.</p>
          <button class="btn btn-primary" onclick="goResult()">결과 확인하기</button>
        </div>
      </div>
    </div>
  `;
}

function runAnalyzing() {
  let i = 0;
  const stepEl = document.getElementById('step-msg');
  const doneEl = document.getElementById('done-area');

  function next() {
    if (i < ANALYZE_STEPS.length) {
      if (stepEl) {
        stepEl.style.animation = 'none';
        void stepEl.offsetWidth; // reflow
        stepEl.style.animation = 'fadeIn 0.35s ease';
        stepEl.textContent = ANALYZE_STEPS[i];
      }
      i++;
      setTimeout(next, 720);
    } else {
      setTimeout(() => { if (doneEl) doneEl.style.display = 'block'; }, 400);
    }
  }
  setTimeout(next, 400);
}

function goResult() {
  state.page = 'result';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════
//  결과 화면
// ══════════════════════════════════════════════
function renderResult() {
  const res = RESULTS[state.resultType];
  const allOpened = state.lettersOpened.every(Boolean);

  root.innerHTML = `
    <div class="screen">

      <!-- 결과 카드 -->
      <div class="card">
        <p class="label" style="margin-bottom: 0.75rem;">당신의 협업 유형</p>
        <h1 style="margin-bottom: 1.25rem;">${res.title}</h1>
        <p style="white-space: pre-line; margin-bottom: 1.5rem;">${res.desc}</p>
        <div>${res.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>

      <!-- 팀원 관찰 기록 섹션 -->
      <div class="card">
        <p class="label" style="margin-bottom: 0.5rem;">ADDITIONAL ANALYSIS</p>
        <h3 style="margin-bottom: 0.75rem;">추가 분석: 팀원 관찰 기록</h3>
        <p style="font-size: 14px; line-height: 1.9; margin-bottom: 1.5rem;">
          테스트 결과와 함께,<br>
          당신과 함께한 팀원들의 관찰 코멘트 3건이 도착했습니다.<br>
          <span style="color: #9e9a92; font-size: 13px;">
            각 코멘트는 함께 일하면서 느낀 당신의 모습에 대한 기록입니다.<br>
            열람 전까지 작성자는 공개되지 않습니다.
          </span>
        </p>

        ${LETTERS.map((l, i) => `
          <div class="letter-card ${state.lettersOpened[i] ? 'opened' : ''}" id="lc-${i}">
            <p class="label" style="margin-bottom: 4px;">${l.cardTitle}</p>
            <h3 style="margin-bottom: 4px;">${l.cardSub}</h3>
            <p style="font-size: 14px;">${l.cardDesc}</p>
            ${state.lettersOpened[i]
              ? `<button class="letter-open-btn done" disabled>열람 완료 ✓</button>`
              : `<button class="letter-open-btn" onclick="openLetter(${i})">열람하기</button>`
            }
          </div>
        `).join('')}
      </div>

      <!-- 엔딩 박스 (모두 열람 시 표시) -->
      ${allOpened ? `
        <div class="ending-box">
          <p class="label" style="color: #8b9e8a; margin-bottom: 0.75rem;">모든 팀원 코멘트를 확인했습니다.</p>
          <p>
            분석 결과,<br>
            당신은 어떤 유형이든<br>
            함께한 사람들에게 꽤 좋은 기억으로 남는 사람입니다.<br><br>
            그리고 이 테스트의 숨겨진 목적은<br>
            당신의 협업 성향을 분석하는 것보다<br>
            오늘을 그냥 지나치지 않기 위한 것이었습니다.<br><br>
            함께한 팀원들이<br>
            각자의 방식으로 당신의 오늘을 기억하고 있습니다.<br><br>
            <span class="ending-highlight">생일 축하해요.</span><br>
            오늘은 팀플 결과보다<br>
            당신이라는 사람이 더 중요한 날입니다.
          </p>
        </div>
      ` : ''}

      <!-- 하단 버튼 -->
      <div style="text-align:center; margin-top: 0.5rem; margin-bottom: 0.5rem;">
        <button class="btn" onclick="resetTest()" style="width: auto; padding: 11px 32px; font-size: 14px;">처음으로 돌아가기</button>
      </div>

    </div>
  `;
}

// ══════════════════════════════════════════════
//  편지 모달
// ══════════════════════════════════════════════
function openLetter(idx) {
  state.lettersOpened[idx] = true;
  const l = LETTERS[idx];

  modalContainer.innerHTML = `
    <div class="modal-backdrop active" id="modal-bd" onclick="handleBackdropClick(event)">
      <div class="modal-box">
        <p class="modal-from">작성자: ${l.from}</p>
        <p class="modal-title">${l.modalTitle}</p>
        <p class="modal-body">${l.body}</p>
        <button class="modal-close" onclick="closeLetter(${idx})">닫기</button>
      </div>
    </div>
  `;
}

function handleBackdropClick(e) {
  if (e.target.id === 'modal-bd') {
    const idx = state.lettersOpened.lastIndexOf(true) - (state.lettersOpened.filter(Boolean).length > 0 ? 0 : 1);
    closeLetter(null);
  }
}

function closeLetter(idx) {
  modalContainer.innerHTML = '';
  render();
  if (idx !== null) {
    setTimeout(() => {
      const card = document.getElementById(`lc-${idx}`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

// ══════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════
function resetTest() {
  state = {
    page: 'start',
    answers: [],
    currentQ: 0,
    resultType: null,
    lettersOpened: [false, false, false]
  };
  modalContainer.innerHTML = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 시작 ──
render();
</script>
</body>
</html>
